<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/img/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>LASER SUITE Anti-Cheat</title>
    <script>
      let titleText = "LASER SUITE Anti-Cheat by Fari Noveri   |   ";
      const glitchChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=[]{}|;:',.<>?/~";
      
      setInterval(() => {
        if (window.location.pathname.includes('/admin')) {
          // Efek teks diacak (Glitch) khusus halaman /admin
          let glitched = "";
          for (let i = 0; i < 12; i++) {
            glitched += glitchChars.charAt(Math.floor(Math.random() * glitchChars.length));
          }
          document.title = "💀 " + glitched + " 💀";
        } else {
          // Teks berjalan normal untuk Landing Page
          titleText = titleText.substring(1) + titleText.charAt(0);
          document.title = titleText;
        }
      }, 200);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
